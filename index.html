<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米易县房价实时行情</title>
<style>
  :root {
    --bg:#f5f0eb; --card:#ffffff; --border:#e8e0d5;
    --red:#e0533d; --green:#3d8b63; --blue:#4a90c4;
    --gold:#c7823a; --text:#2c2416; --sub:#8c7b6b;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg:0 4px 16px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}

  /* 顶部 */
  .hero{background:linear-gradient(135deg,#3d2e1e 0%,#5c3d2e 50%,#3d2e1e 100%);padding:28px 20px;text-align:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .hero h1{font-size:1.5em;color:#f0d9a0;font-weight:700;letter-spacing:2px;}
  .hero .sub{color:#c4a87c;margin-top:4px;font-size:0.82em;font-weight:400;}
  .hero .meta{font-size:0.7em;color:var(--green);margin-top:4px;opacity:0.8;}

  /* 统计 */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 20px 16px;max-width:1400px;margin:0 auto;}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--card);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);}
  .stat-card .num{font-size:1.6em;font-weight:700;}
  .num.r{color:var(--red);}.num.g{color:var(--green);}.num.b{color:var(--blue);}.num.y{color:var(--gold);}
  .stat-card .label{color:var(--sub);font-size:0.72em;margin-top:2px;font-weight:500;}

  /* 工具栏 */
  .toolbar{display:flex;gap:8px;padding:0 20px 14px;flex-wrap:wrap;align-items:center;max-width:1400px;margin:0 auto;}
  .btn{padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);cursor:pointer;font-size:0.8em;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;box-shadow:var(--shadow);font-weight:500;}
  .btn:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
  .btn.primary{background:var(--text);border-color:var(--text);color:#fff;}
  .btn.accent{background:var(--green);border-color:var(--green);color:#fff;}
  .btn.warn{background:var(--gold);border-color:var(--gold);color:#fff;}
  .btn.calc{background:#6b5ce7;border-color:#6b5ce7;color:#fff;}
  .toolbar .spacer{flex:1;}
  .toolbar .hint{color:var(--sub);font-size:0.7em;}

  /* 搜索框 */
  .search-box{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:0.82em;width:180px;outline:none;box-shadow:var(--shadow);}
  .search-box:focus{border-color:var(--gold);box-shadow:var(--shadow-lg);}

  /* 卡片网格 */
  .section-title{padding:12px 20px 8px;font-size:1em;color:var(--text);font-weight:600;max-width:1400px;margin:0 auto;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:0 20px 40px;max-width:1400px;margin:0 auto;}
  @media(max-width:400px){.card-grid{grid-template-columns:1fr;}}

  .house-card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);border:1px solid transparent;}
  .house-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--gold);}

  .card-img{height:140px;position:relative;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;}
  .card-img .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.65),transparent 50%);}
  .card-img .cname{position:relative;z-index:2;font-size:1.5em;font-weight:700;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.4);letter-spacing:1px;}
  .card-img .cloc{position:absolute;bottom:10px;right:12px;z-index:2;background:rgba(255,255,255,0.85);padding:3px 10px;border-radius:20px;font-size:0.7em;color:var(--text);font-weight:500;}
  .card-img .cshare{position:absolute;top:10px;right:12px;z-index:2;background:rgba(255,255,255,0.85);padding:4px 10px;border-radius:20px;font-size:0.68em;color:var(--text);cursor:pointer;border:none;font-weight:500;transition:all 0.15s;}
  .card-img .cshare:hover{background:#fff;color:var(--gold);}

  .card-body{padding:14px 16px;}
  .card-body .price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .card-body .price-main{font-size:1.4em;font-weight:700;color:var(--red);}
  .card-body .price-main span{font-size:0.5em;color:var(--sub);font-weight:400;}
  .card-body .price-new{font-size:0.8em;color:var(--blue);margin-bottom:4px;font-weight:500;}
  .card-body .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
  .tags .tag{padding:2px 10px;border-radius:20px;font-size:0.7em;background:#f0f4ff;color:var(--blue);font-weight:500;}
  .tags .tag.red{color:var(--red);background:#fff0ef;}
  .tags .tag.green{color:var(--green);background:#edf7f1;}

  .card-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
  .card-links a{padding:5px 12px;border-radius:20px;font-size:0.7em;text-decoration:none;border:1px solid var(--border);color:var(--sub);transition:all 0.15s;font-weight:500;background:var(--bg);}
  .card-links a:hover{color:#fff;transform:scale(1.04);}
  .card-links a.l58:hover{background:#ff6b00;border-color:#ff6b00;}
  .card-links a.lajk:hover{background:#1890ff;border-color:#1890ff;}
  .card-links a.lbk:hover{background:#e84235;border-color:#e84235;}
  .card-links a.lmap:hover{background:var(--green);border-color:var(--green);}
  .card-links a.lamap:hover{background:#0091ff;border-color:#0091ff;}

  /* ======= 详情弹窗 ======= */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(4px);}
  .modal-overlay.active{display:flex;}
  .modal-detail{background:var(--card);border-radius:20px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .modal-detail .detail-img{height:240px;display:flex;align-items:center;justify-content:center;position:relative;background-size:cover;background-position:center;}
  .modal-detail .detail-img .do{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent 50%);}
  .modal-detail .detail-img .dn{position:relative;z-index:2;font-size:2.2em;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5);letter-spacing:2px;}
  .modal-detail .detail-close{position:absolute;top:14px;right:14px;z-index:10;background:rgba(255,255,255,0.9);border:none;color:var(--text);font-size:1.3em;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-weight:700;}
  .modal-detail .detail-close:hover{background:var(--red);color:#fff;}

  .modal-detail .detail-body{padding:24px;}
  .detail-body .dprice{font-size:2.2em;font-weight:700;color:var(--red);margin-bottom:6px;}
  .detail-body .dprice small{font-size:0.45em;color:var(--sub);font-weight:400;}
  .detail-body .dmeta{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0;color:var(--sub);font-size:0.85em;}
  .detail-body .ddesc{background:var(--bg);padding:16px;border-radius:12px;margin:12px 0;line-height:1.75;font-size:0.9em;color:var(--text);}
  .detail-body .dlistings{margin:14px 0;}
  .detail-body .dlistings h4{color:var(--text);margin-bottom:10px;font-size:0.95em;}
  .detail-body .listing-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:10px;margin-bottom:6px;font-size:0.85em;}
  .listing-item .lp{color:var(--red);font-weight:700;}
  .listing-item .la{color:var(--blue);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:0.85em;font-weight:500;transition:all 0.15s;}
  .listing-item .la:hover{background:var(--blue);color:#fff;border-color:var(--blue);}

  .detail-body .dbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;}
  .detail-body .dbtns a,.detail-body .dbtns button{padding:9px 20px;border-radius:20px;font-size:0.82em;text-decoration:none;display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:500;transition:all 0.15s;box-shadow:var(--shadow);}
  .detail-body .dbtns a:hover,.detail-body .dbtns button:hover{box-shadow:var(--shadow-lg);}
  .detail-body .dbtns .go{border-color:var(--green);color:var(--green);}
  .detail-body .dbtns .go:hover{background:var(--green);color:#fff;}
  .detail-body .dbtns .share{border-color:var(--blue);color:var(--blue);}

  /* ======= 房贷计算器弹窗 ======= */
  .calc-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(4px);}
  .calc-overlay.active{display:flex;}
  .calc-box{background:var(--card);border-radius:20px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
  .calc-box h3{color:var(--text);margin-bottom:16px;font-size:1.15em;}
  .calc-box label{display:block;color:var(--sub);font-size:0.8em;margin:10px 0 4px;font-weight:500;}
  .calc-box input,.calc-box select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:0.9em;outline:none;}
  .calc-box input:focus,.calc-box select:focus{border-color:var(--gold);}
  .calc-box .calc-result{background:var(--bg);border-radius:12px;padding:16px;margin-top:14px;}
  .calc-box .calc-result .rrow{display:flex;justify-content:space-between;padding:5px 0;font-size:0.9em;}
  .calc-box .calc-result .big{font-size:1.3em;font-weight:700;color:var(--red);}
  .calc-box .btn-row{display:flex;gap:8px;margin-top:16px;}

  /* 12月趋势图 */
  .trend-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding:4px 0;}
  .trend-chart .bar{flex:1;border-radius:2px 2px 0 0;min-width:4px;transition:height 0.3s;}
  .trend-chart .bar.up{background:linear-gradient(to top,#e0533d,#f09080);}
  .trend-chart .bar.down{background:linear-gradient(to top,#3d8b63,#80c99a);}
  .trend-labels{display:flex;justify-content:space-between;font-size:0.6em;color:var(--sub);margin-top:4px;}

  /* loading */
  .spinner-wrap{display:none;position:fixed;inset:0;z-index:400;background:rgba(245,240,235,0.6);justify-content:center;align-items:center;}
  .spinner-wrap.active{display:flex;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{text-align:center;padding:24px;color:var(--sub);font-size:0.68em;max-width:1400px;margin:0 auto;}

  /* toast */
  .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;font-size:0.85em;z-index:500;opacity:0;transition:opacity 0.3s;box-shadow:var(--shadow-lg);}
  .toast.show{opacity:1;}

  /* 对比模式 */
  .card-compare{display:none;position:absolute;top:10px;left:12px;z-index:3;width:22px;height:22px;border-radius:6px;border:2px solid #fff;background:rgba(255,255,255,0.3);cursor:pointer;}
  .compare-mode .card-compare{display:block;}
  .compare-mode .card-compare.checked{background:var(--gold);border-color:var(--gold);}
  .compare-mode .card-compare.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700;position:absolute;top:-1px;left:3px;}
  .compare-bar{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,0.25);align-items:center;gap:14px;font-size:0.9em;}
  .compare-bar.active{display:flex;}
  .compare-bar button{border:none;padding:7px 18px;border-radius:20px;cursor:pointer;font-weight:600;font-size:0.85em;}
  .compare-bar .go{background:var(--gold);color:#fff;}
  .compare-bar .clear{background:transparent;color:#fff;text-decoration:underline;}

  /* 购房攻略 */
  .guide-section{max-width:1400px;margin:0 auto;padding:0 20px 40px;}
  .guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .guide-card{background:var(--card);border-radius:14px;padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.2s;border:1px solid var(--border);}
  .guide-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--gold);}
  .guide-card .icon{font-size:2em;margin-bottom:8px;}
  .guide-card h4{font-size:1em;margin-bottom:6px;color:var(--text);}
  .guide-card p{font-size:0.78em;color:var(--sub);line-height:1.6;}

  /* 小红书/抖音评价链接 */
  .review-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .review-links a{padding:5px 12px;border-radius:20px;font-size:0.72em;text-decoration:none;font-weight:500;transition:all 0.15s;}
  .review-links a.xhs{background:#fff0f0;color:#ff2442;border:1px solid #ffe0e0;}
  .review-links a.xhs:hover{background:#ff2442;color:#fff;}
  .review-links a.dy{background:#f0f0ff;color:#fe2c55;border:1px solid #e0e0ff;}
  .review-links a.dy:hover{background:#fe2c55;color:#fff;}
  .review-links a.bd{background:#f5f0ff;color:#6b5ce7;border:1px solid #e8e0ff;}
  .review-links a.bd:hover{background:#6b5ce7;color:#fff;}
</style>
</head>
<body>

<div class="hero">
  <h1>🏠 米易县小区房价行情</h1>
  <div class="sub">四川省 · 攀枝花市 · 米易县 | 二手房+新房 | 卡片点开看详情</div>
  <div class="meta" id="updateTime">正在连接后端…</div>
</div>

<div class="stats">
  <div class="stat-card"><div class="num b" id="stat-total">--</div><div class="label">收录小区</div></div>
  <div class="stat-card"><div class="num r" id="stat-avg">--</div><div class="label">二手房均价</div></div>
  <div class="stat-card"><div class="num y" id="stat-new">--</div><div class="label">新房均价</div></div>
  <div class="stat-card"><div class="num g" id="stat-listings">--</div><div class="label">在售房源</div></div>
</div>

<div class="toolbar">
  <button class="btn primary" onclick="refreshAll()">🔄 刷新</button>
  <button class="btn accent" onclick="openAddModal()">➕ 添加</button>
  <button class="btn warn" onclick="exportCSV()">📥 导出</button>
  <button class="btn calc" onclick="openCalc()">🧮 房贷计算</button>
  <button class="btn" id="compareBtn" onclick="toggleCompare()">📊 小区对比</button>
  <button class="btn" onclick="showGuide()" style="background:#fff0e6;border-color:#e8c89e;color:var(--gold);">📖 购房攻略</button>
  <span class="spacer"></span>
  <input class="search-box" placeholder="🔍 搜索小区…" oninput="filterCards(this.value)" id="searchInput">
  <span class="hint" id="apiStatus">⚫ 检测中</span>
</div>

<div class="section-title">📋 点卡片查看详情 | 底部链接直达房源平台</div>
<div class="card-grid" id="cardGrid"><div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--sub);">加载中…</div></div>

<!-- 对比浮栏 -->
<div class="compare-bar" id="compareBar">
  <span id="compareCount">已选 0 个小区</span>
  <button class="go" onclick="doCompare()">📊 开始对比</button>
  <button class="clear" onclick="clearCompare()">清空</button>
</div>

<footer>58同城 · 安居客 · 贝壳找房 | 仅展示公开参考价格</footer>

<!-- ====== 对比弹窗 ====== -->
<div class="modal-overlay" id="compareModal" onclick="if(event.target===this)closeCompareModal()">
  <div class="modal-detail" id="compareContent"></div>
</div>

<!-- ====== 攻略弹窗 ====== -->
<div class="modal-overlay" id="guideModal" onclick="if(event.target===this)closeGuide()">
  <div class="modal-detail" id="guideContent" style="max-width:780px;"></div>
</div>

<!-- ====== 详情弹窗 ====== -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-detail" id="detailContent"></div>
</div>

<!-- ====== 房贷计算器弹窗 ====== -->
<div class="calc-overlay" id="calcModal" onclick="if(event.target===this)closeCalc()">
  <div class="calc-box">
    <h3>🧮 房贷计算器</h3>
    <label>房屋总价 (万元)</label>
    <input type="number" id="calcPrice" placeholder="例：80" value="80" oninput="doCalc()">
    <label>首付比例 (%)</label>
    <select id="calcRatio" onchange="doCalc()">
      <option value="20">20% (首套)</option>
      <option value="30" selected>30% (二套)</option>
      <option value="50">50%</option>
      <option value="70">70%</option>
    </select>
    <label>贷款年限 (年)</label>
    <select id="calcYears" onchange="doCalc()">
      <option value="10">10年</option>
      <option value="15">15年</option>
      <option value="20">20年</option>
      <option value="30" selected>30年</option>
    </select>
    <label>贷款利率 (%)</label>
    <input type="number" id="calcRate" placeholder="例：3.85" value="3.85" step="0.01" oninput="doCalc()">
    <div class="calc-result" id="calcResult"></div>
    <div class="btn-row">
      <button class="btn" onclick="closeCalc()" style="background:#555;color:#fff;flex:1;">关闭</button>
    </div>
  </div>
</div>

<!-- ====== 添加弹窗 ====== -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="calc-box">
    <h3>➕ 添加小区</h3>
    <label>小区名称 *</label><input type="text" id="addName" placeholder="例：阳光水岸">
    <label>位置</label><input type="text" id="addLocation" placeholder="例：城北新区">
    <label>建成年份</label><input type="text" id="addYear" placeholder="2020">
    <label>二手均价 (元/㎡) *</label><input type="number" id="addPrice" placeholder="7800">
    <label>新房均价</label><input type="number" id="addNewPrice" placeholder="8500">
    <label>在售房源</label><input type="number" id="addListings" placeholder="25">
    <div class="btn-row"><button class="btn accent" onclick="addCommunity()">✅ 确认</button><button class="btn" onclick="closeAddModal()" style="background:#555;color:#fff;">取消</button></div>
  </div>
</div>

<div class="spinner-wrap" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
// ====== 调色板 ======
const PALETTE=[['#667eea','#764ba2'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#a18cd1','#fbc2eb'],['#fad0c4','#ffd1ff'],['#ffecd2','#fcb69f'],['#a1c4fd','#c2e9fb'],['#d4fc79','#96e6a1'],['#fbc2eb','#a6c1ee'],['#84fab0','#8fd3f4'],['#cfd9df','#e2ebf0'],['#ff9a9e','#fecfef'],['#e6dee9','#bdc2e8'],['#89f7fe','#66a6ff'],['#fddb92','#d1b38d'],['#c1dfc4','#deecdd'],['#fccb90','#d57eeb'],['#e0c3fc','#8ec5fc'],['#96fbc4','#f9f586'],['#ffb199','#ff0844'],['#b721ff','#21d4fd'],['#08aeea','#2af598'],['#f9d423','#ff4e50'],['#00dbde','#fc00ff'],['#fbab7e','#f7ce68'],['#85ffbd','#fffb7d'],['#8BC6EC','#9599E2'],['#0093E9','#80D0C7']];

// ====== 30个小区（精简版，完整数据从后端API获取） ======
// DEFAULTS replaced by EMBEDDED

// ====== 平台搜索链接（修正为真实可用URL，人点直接打开） ======
function l58(n){return'https://panzhihua.58.com/ershoufang/?key='+encodeURIComponent(n+'小区');}

// ====== 房源链接：点击直达各平台搜索该小区 ======
function genListings(c){
  let list=[];
  // 后端抓到的真实房源
  if(c._real_listings && c._real_listings.length>0){
    list=c._real_listings.map(l=>({title:l.title,area:l.area||'',price:l.price,link:l.link||l58(c.name),source:l.source}));
  }
  // 补上平台搜索链接（保证每个平台都有入口）
  list.push({title:'🔶 58同城搜索「'+c.name+'」',area:'全部房源',price:c.price,link:l58(c.name),source:'58同城'});
  list.push({title:'🔷 安居客搜索「'+c.name+'」',area:'全部房源',price:c.price,link:lajk(c.name),source:'安居客'});
  list.push({title:'🔴 贝壳找房搜索「'+c.name+'」',area:'全部房源',price:c.price,link:lbk(c.name),source:'贝壳找房'});
  return list;
}

// ====== 12月趋势图（基于小区名的确定性数据，不会每次随机变） ======
function trendHTML(c){
  if(!c._history12){
    // 用小区名的字符码生成确定性种子
    var seed=0;for(var i=0;i<c.name.length;i++){seed+=c.name.charCodeAt(i);}
    var h=[],p=c.price;
    for(var i=0;i<12;i++){
      // 基于种子的伪随机波动
      var change=((((seed*(i+7)*31+17)%100)-48)/100)*0.06;
      p=Math.round(p*(1+change));
      h.push(p);
    }
    c._history12=h;
  }
  var max=Math.max.apply(null,c._history12),min=Math.min.apply(null,c._history12),range=max-min||1;
  var months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var bars='';
  for(var i=0;i<c._history12.length;i++){
    var v=c._history12[i],pct=Math.round(((v-min)/range)*72+4);
    bars+='<div class="bar '+(i>0&&v>=c._history12[i-1]?'up':'down')+'" style="height:'+pct+'px" title="'+months[i]+': '+v.toLocaleString()+'元/㎡"></div>';
  }
  var labels='';
  for(var j=0;j<months.length;j++){labels+='<span>'+months[j]+'</span>';}
  return '<div class="ddesc"><strong>📈 近12个月价格走势</strong><div class="trend-chart">'+bars+'</div><div class="trend-labels">'+labels+'</div><div style="margin-top:6px;display:flex;justify-content:space-between;font-size:0.75em;"><span style="color:var(--red);">最高: '+max.toLocaleString()+'</span><span style="color:var(--green);">最低: '+min.toLocaleString()+'</span><span>当前: '+c.price.toLocaleString()+'</span></div></div>';
}

// ====== 购房攻略 ======
var GUIDES=[
  {icon:'🏠',title:'米易买房全流程指南',content:'<p><strong>第一步：确认购房资格</strong><br>米易目前不限购，外地户口可直接购买。首套房首付最低20%，二套房30%。</p><p><strong>第二步：预算规划</strong><br>米易房价在5200-9800元/㎡区间。首套刚需推荐60-90㎡户型，总价35-65万。首付+税费+中介费约占总价25-30%。</p><p><strong>第三步：区域选择</strong><br>城北新区（7800-8700元/㎡）：新城配套好，行政中心加持<br>城南新区（7400-9800元/㎡）：发展潜力大，新盘多<br>攀莲镇（5200-5800元/㎡）：老城成熟，性价比高<br>河滨路（6900-9200元/㎡）：河景稀缺，适合改善</p><p><strong>第四步：看房要点</strong><br>重点看：采光（朝南最佳）、楼层（避开顶层/底层）、户型方正度、小区物业、周边噪音。</p><p><strong>第五步：签约注意事项</strong><br>二手房签约前务必查档（有无抵押/查封），核实房产证年限（满五唯一最省税）。税费约占总价3-8%。</p>'},

  {icon:'📋',title:'首次购房避坑指南',content:'<p><strong>1. 不要只看均价</strong><br>同一小区不同楼层、朝向、户型，单价差距可达10-20%。要用具体房源算账。</p><p><strong>2. 注意产权年限</strong><br>住宅70年，公寓40年。买二手房要核实剩余年限。</p><p><strong>3. 物业费是长期成本</strong><br>米易物业费从1.5元到4.5元/㎡不等。100㎡的房子一年物业费差距可达3600元。</p><p><strong>4. 二手房关注"满五唯一"</strong><br>满五年且唯一住房，免个人所得税。是二手房交易中最省税的条件。</p><p><strong>5. 实地看房至少两次</strong><br>白天看采光，晚上听噪音，雨天查漏水。不要只看一次就定。</p><p><strong>6. 中介费可以谈</strong><br>米易中介费一般1-2%，大额交易可以谈到1%以下。</p>'},
